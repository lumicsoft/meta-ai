<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta AI - Pro-Max Analytics Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020407; }
        .luxury-node-card { background: linear-gradient(145deg, rgba(11, 18, 32, 0.6) 0%, rgba(4, 6, 12, 0.95) 100%); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.02); }
        .orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="text-slate-300 p-6">

    <!-- Navbar -->
    <header class="w-full fixed top-0 left-0 z-50 bg-[#04070c]/80 backdrop-blur-xl border-b border-white/[0.04]">
        <div class="max-w-7xl mx-auto h-20 flex items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center">
                    <i data-lucide="cpu" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <span class="text-lg font-extrabold text-white block">META <span class="text-cyan-400">AI</span></span>
                </div>
            </div>
            
            <button id="connect-btn" onclick="handleLogin()" class="bg-gradient-to-r from-cyan-500 to-blue-600 px-5 h-10 rounded-xl text-xs font-bold text-white flex items-center gap-2">
                <i data-lucide="wallet" class="w-3.5 h-3.5"></i> <span>Connect Wallet</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto space-y-8 mt-24">
        
        <!-- Passport Section -->
        <section class="luxury-node-card rounded-3xl p-5">
            <div class="flex flex-col lg:flex-row justify-between items-center gap-5">
                <div>
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Active Terminal</span>
                    <span id="user-address" class="text-xs font-mono text-blue-400 block mt-1">0x0000...0000</span>
                </div>
                <div class="bg-black/40 p-2 rounded-2xl flex items-center gap-3 border border-white/[0.02]">
                    <input id="refURL" type="text" readonly class="bg-transparent outline-none w-64 text-xs text-slate-400 px-2" value="Loading...">
                    <button onclick="copyLink()" class="bg-cyan-600 text-white px-4 h-8 rounded-xl text-[10px] font-bold">COPY</button>
                </div>
            </div>
        </section>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="luxury-node-card p-5 rounded-2xl">
                <span class="text-[10px] text-slate-500 uppercase">Allocated Capital</span>
                <h4 id="allocated-capital-usdt" class="text-xl font-black text-white mt-1">0.00</h4>
            </div>
            <div class="luxury-node-card p-5 rounded-2xl">
                <span class="text-[10px] text-slate-500 uppercase">Purchased MTA</span>
                <h4 id="total-purchased-mta" class="text-xl font-black text-white mt-1">0.00</h4>
            </div>
            <div class="luxury-node-card p-5 rounded-2xl border-b border-cyan-500/50">
                <span class="text-[10px] text-cyan-400 uppercase">Claimable Yield</span>
                <h4 id="daily-release-mta" class="text-xl font-black text-cyan-400 mt-1">0.00</h4>
            </div>
            <div class="luxury-node-card p-5 rounded-2xl">
                <span class="text-[10px] text-slate-500 uppercase">Total Released</span>
                <h4 id="total-released-mta" class="text-xl font-black text-white mt-1">0.00</h4>
            </div>
        </div>

        <!-- Action Section -->
        <section class="luxury-node-card rounded-3xl p-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h3 class="text-sm font-bold text-white">Liquidation Vault</h3>
                    <p class="text-[10px] text-slate-500 mt-1">Rewards Balance: <span id="available-balance" class="text-cyan-400">0.00</span> MTA</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="handleWithdrawAvailable()" class="bg-slate-900 border border-white/10 px-6 py-3 rounded-xl text-xs font-bold uppercase">Withdraw</button>
                    <button onclick="handleSwapAndBurn()" class="bg-cyan-600 px-6 py-3 rounded-xl text-xs font-bold uppercase">Swap & Burn</button>
                </div>
            </div>
        </section>

        <!-- Network Stats -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="luxury-node-card p-5 rounded-2xl">
                <span class="text-[10px] text-slate-500 uppercase">Direct Team</span>
                <h4 id="direct-team-count" class="text-2xl font-black text-white mt-2">0</h4>
            </div>
            <div class="luxury-node-card p-5 rounded-2xl">
                <span class="text-[10px] text-slate-500 uppercase">Total Network</span>
                <h4 id="total-team-count" class="text-2xl font-black text-white mt-2">0</h4>
            </div>
        </div>
    </main>

    <!-- Required Libraries -->
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <script src="web3Handler.js"></script>
    <script>
        lucide.createIcons();
        window.addEventListener('load', init); // init() function ko yahan load kar rahe hain
        function copyLink() {
            const refInput = document.getElementById('refURL');
            navigator.clipboard.writeText(refInput.value);
            alert("Referral link copied!");
        }
    </script>
</body>
</html>
